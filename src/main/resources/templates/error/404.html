<!-- error/404.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Not Found')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div class="container text-center mt-5">
    <h1 class="display-1 text-danger">404</h1>
    <h2>Page Not Found</h2>
    <p class="text-muted" th:text="${message ?: 'The resource you requested does not exist.'}"></p>
    <a th:href="@{/clubs}" class="btn btn-primary mt-3">Back to Clubs</a>
</div>
<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
