<!-- events/detail.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${event.name})}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div class="container">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/clubs}">Clubs</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/clubs/{id}(id=${club.id})}" th:text="${club.name}"></a>
            </li>
            <li class="breadcrumb-item active" th:text="${event.name}"></li>
        </ol>
    </nav>

    <h1 th:text="${event.name}"></h1>

    <table class="table table-bordered w-50">
        <tr>
            <th>Club</th>
            <td th:text="${club.name}"></td>
        </tr>
        <tr>
            <th>Date</th>
            <td th:text="${event.date}"></td>
        </tr>
        <tr>
            <th>Type</th>
            <td th:text="${event.type}"></td>
        </tr>
        <tr>
            <th>Location</th>
            <td th:text="${event.location ?: '-'}"></td>
        </tr>
        <tr>
            <th>Description</th>
            <td th:text="${event.description ?: '-'}"></td>
        </tr>
    </table>

    <div class="mt-3">
        <a th:href="@{/clubs/{cid}/events/{eid}/edit(cid=${club.id},eid=${event.id})}"
           class="btn btn-warning">Edit</a>
        <a th:href="@{/clubs/{cid}/events/{eid}/delete(cid=${club.id},eid=${event.id})}"
           class="btn btn-danger">Delete</a>
        <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-secondary">Back to Club</a>
    </div>
</div>
<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
